<div style="text-align:center; margin-top:40px;">

  <button id="downloadBtn"
          style="
            padding:12px 20px;
            font-size:16px;
            border:none;
            border-radius:10px;
            cursor:pointer;
          ">
   Vérifier les chants disponibles hors connexion 

 </button>

<div style="width:100%; max-width:400px; margin:20px auto;">

  <div style="background:#ddd; height:18px; border-radius:10px; overflow:hidden;">
    <div id="bar" style="height:100%; width:0%; background:#2d6cdf;"></div>
  </div>

  <div id="progressText" style="text-align:center; margin-top:8px; font-size:14px;">
  </div>

</div>

  <div id="status"
       style="
         margin-top:15px;
         font-size:14px;
         color:#444;
       ">
  </div>

</div>


<p style="font-size:10px;color:#888;text-align:center">
Version du 15-06-2026 13h20
</p>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js', {
    updateViaCache: 'none'
  }).then(reg => {
    reg.update();

    // 🔥 IMPORTANT : force l’activation immédiate du nouveau SW
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      window.location.reload();
    });
  });
}
</script>

<script>
document.getElementById("downloadBtn")
  .addEventListener("click", async () => {

    const status = document.getElementById("status");

    try {

      const keys = await caches.keys();

      let chants = [];

      for (const cacheName of keys) {
        const cache = await caches.open(cacheName);
        const requests = await cache.keys();

        for (const req of requests) {
          const url = req.url;

          if (
            url.includes("_pdf/") &&
            url.endsWith(".pdf") &&
            !url.includes("index.html")
          ) {
            chants.push(url);
          }
        }
      }

      const unique = [...new Set(chants)];

      const total = 220;

      status.textContent =
        `${unique.length} / ${total} chants disponibles hors connexion`;

    } catch (e) {
      console.error(e);
      status.textContent = "Erreur lecture cache";
    }

  });

</script>
