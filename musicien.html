<!DOCTYPE html>
<html>

<style>

#toolbar{
  position:fixed;
  top:20px;
  left:10px;
  z-index:9999;
  background:rgba(255,255,255,0.8);
  border:1px solid black;
  border-radius:10px;
  padding:5px;
}

#toolbar button{
  font-size:20px;
  margin:5px;
  padding:5px 10px;
}

#page{
  width:100%;
  height:auto;
}

</style>

<body>

<img id="page">

<div id="toolbar">
  <button id="prev">◀</button>
  <button id="next">▶</button>
</div>

<script>

const params = new URLSearchParams(location.search);
const dossier = params.get("dossier");
const chant = params.get("chant");

let page = 1;
let nbPages = 1;

const image = document.getElementById("page");

function afficherPage() {
    image.src = `${dossier}/${chant}-${page}.jpg`;
}

// Comptage automatique des pages
function compterPages() {

    let p = 1;

    function tester() {

        const img = new Image();

        img.onload = function () {
            nbPages = p;
            p++;
            tester();
        };

        img.onerror = function () {
            console.log("Nombre de pages :", nbPages);
        };

        img.src = `${dossier}/${chant}-${p}.jpg`;
    }

    tester();
}

function pageSuivante() {
    if (page < nbPages) {
        page++;
        afficherPage();
    }
}

function pagePrecedente() {
    if (page > 1) {
        page--;
        afficherPage();
    }
}

// Première page
afficherPage();

// Recherche du nombre total de pages
compterPages();

document.addEventListener("keydown", function(e){

    switch(e.key){

        case "ArrowRight":
        case "PageDown":
        case " ":
        case "Enter":
            pageSuivante();
            e.preventDefault();
            break;

        case "ArrowLeft":
        case "PageUp":
            pagePrecedente();
            e.preventDefault();
            break;
    }

});

document.getElementById("next").onclick = pageSuivante;
document.getElementById("prev").onclick = pagePrecedente;

</script>

</body>
</html>
