<!DOCTYPE html>
<html>

<style>

#toolbar{
  position:fixed;
  top:20px;
  left:20px;
  z-index:9999;

 background:rgba(255,255,255,0.8);
  border:1px solid black;
  border-radius:10px;
  padding:5px;

}

#toolbar button{
  font-size:20px;
  margin:5px;
  padding:5px 10px;
}


#page{
  width:100%;
  height:auto;
}

</style>

<body>

<img id="page">

<div id="toolbar">
  <button id="prev">◀</button>
  <button id="next">▶</button>
</div>

<script>

const params = new URLSearchParams(location.search);
const dossier = params.get("dossier");
const chant = params.get("chant");

let page = 1;

document.getElementById("page").src =
  dossier + "/" +
  chant + "-" +
  page + ".jpg";

/* clavier */

document.addEventListener("keydown", function(e) {

  if (e.key === "ArrowRight") {

    page++;

document.getElementById("page").src =
  dossier + "/" +
  chant + "-" +
  page + ".jpg";
   

  }

  if (e.key === "ArrowLeft" && page > 1) {

    page--;

document.getElementById("page").src =
  dossier + "/" +
  chant + "-" +
  page + ".jpg";

  }

});

/* boutons */

document.getElementById("next").onclick = function() {

  const test = new Image();

  test.onload = function() {

    page++;

    document.getElementById("page").src =
      dossier + "/" + chant + "-" + page + ".jpg";

  };

  test.src =
    dossier + "/" + chant + "-" + (page + 1) + ".jpg";

};

document.getElementById("prev").onclick = function() {

  if (page > 1) {

    page--;

document.getElementById("page").src =
  dossier + "/" +
  chant + "-" +
  page + ".jpg";

  }

};

</script>

</body>
</html>
