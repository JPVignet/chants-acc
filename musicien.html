<!DOCTYPE html>
<html>

<style>

#toolbar{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
}

#toolbar button{
  font-size:40px;
  margin:10px;
  padding:10px 20px;
}

</style>

<body>

<img id="page">

<div id="toolbar">
  <button id="prev">◀</button>
  <button id="next">▶</button>
</div>

<script>

const params = new URLSearchParams(location.search);
const dossier = params.get("dossier");
const chant = params.get("chant");

let page = 1;

document.getElementById("page").src =
  dossier + "/" +
  chant + "_" +
  page + ".jpg";

/* clavier */

document.addEventListener("keydown", function(e) {

  if (e.key === "ArrowRight") {

    page++;

    document.getElementById("page").src =
      chant + "_" + page + ".jpg";

  }

  if (e.key === "ArrowLeft" && page > 1) {

    page--;

    document.getElementById("page").src =
      chant + "_" + page + ".jpg";

  }

});

/* boutons */

document.getElementById("next").onclick = function() {

  page++;

  document.getElementById("page").src =
    chant + "_" + page + ".jpg";

};

document.getElementById("prev").onclick = function() {

  if (page > 1) {

    page--;

    document.getElementById("page").src =
      chant + "_" + page + ".jpg";

  }

};

</script>

</body>
</html>
