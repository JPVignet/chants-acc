<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mode Musicien</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
}

#toolbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:white;
  padding:10px;
  border-bottom:1px solid #ccc;
  z-index:9999;
}

button{
  padding:8px 12px;
  margin-right:5px;
}

iframe{
  width:100%;
  height:100vh;
  border:none;
}
</style>
</head>

<body>

<div id="toolbar">
  <button onclick="startScroll()">▶</button>
  <button onclick="stopScroll()">⏸</button>

  <button onclick="speed=1">🐢</button>
  <button onclick="speed=2">🚶</button>
  <button onclick="speed=4">🏃</button>
</div>

<iframe
 id="viewer"
 src="pdfjs/web/viewer.html?file=../../Chants_Basques_acc/ABENTURAZ_ABENTURA.pdf">
</iframe>

<script>

let timer = null;
let speed = 2;

function startScroll(){

  stopScroll();

  const iframe =
    document.getElementById("viewer");

  timer = setInterval(() => {

    try {

      iframe.contentWindow.scrollBy(
        0,
        speed
      );

    } catch(e){}

  },50);
}

function stopScroll(){

  if(timer){
    clearInterval(timer);
    timer = null;
  }
}

</script>

</body>
</html>
